body:
  text: 别號録卷七崑山葛萬里撰西樵方獻夫叔賢閣臣靖粵吳鄒奕宏道知府永蘇松馮忠原孝知府慶鄞海王端溪陳鶴鳴壄九臯山人靖越野史謹公謹縣丞永崑雪劉丞直宗弼崆峒參政初江謝林瓊𣗳處士龜巢子李石城三橋文彭夀承國博衡山子西劉鈗汝中太常德東林恕道近按察慶閩東趙晦浚明教諭初粵顧璘華玉司冦靖南楊大章章之刑侍靖越雲郭萬程子長主事靖閩雙朱懷幹守正太守靖湖泗陶承學子述禮書歇菴父草郎英仁寶七修慶杭野戴圭秉誠處士靖鄞林垠天宇户郎慶閩鐡黃矩洲吳臯喻時中甫户侍靖河東周砥履道通判初蘇張愖汝誠統陸淵之克深布政𢎞南桑維喬子木御史靖揚王堯封伯圻戶書靖北鄒元標爾瞻總憲啓江松許讃廷美閣老東崖子湘蔣冕敬之閣老靖全州龍陸冶齊鳯張鶴鳴元平兵書禎潁鶴喬允升吉甫刑書禎河方坡曹世盛際卿參政靖閩松曽鶴齡延年松􅋯學士宣江畢鏘廷鳴司農厯南泉王英時彥宗伯統江虞楊博維約太宰慶晋蘭黃諌廷臣學士順揚小陳石亭午江以逹于順提學靖江玉張原士元給諫靖秦竹吳節與儉祭酒順江桂左贊時翊布政成江秫黎貞彥暉陶生廣文初粵雪萬節資中副使統江夢張淵子靜夢鶴𢎞蘇敖文禎禮侍慶江鶴王良佐良弼知縣靖松汪鶴嶼東沙張時徹惟靜兵書靖鄞南熊過叔仁部曹靖川金傅廣居乾駱從宇禮書啓湖白陳獻章公甫檢討治粵鄭樗菴景前溪鷺孫偉朗望知府靖同野蕭端䝉啓明御史慶粵劉廷梅與和副使慶江李渭湜之參政厯黔張如蘭德馨參將厯南西𡊮崇冕布衣靖東黃中文卿副使靖處李璣邦在禮書慶江東郭朴質夫閣臣慶河南歐陽德崇一閣學靖江芝孟芝軒秋嚴起恆相國末越周翁汝進子先參政啓杭涇吕柟仲木詹事靖秦莘田汝耕深甫司務靖汴藝瞿稼軒槐王維楨允寧祭酒靖秦樗方金湖巖陳邦彥㑹斌司馬末粵九孫良器貢甫山人厯歙小倪宗正本端知府德越白殷秋溟洞廖道南鳴吾𤣥素學士靖楚鹿史道克宏兵書靖北朔尹耕子萃僉事靖晋心城劉錫𤣥玉受參政禎蘇方宗臣子相副使靖揚林東城東林春子仁文選靖揚青王璲汝玉賔客永蘇寅李成梁寧逺啓螺孫子良兩司宣杭古張吉克修方伯德江石李傑世賢吏書德蘇許榖仲貽太常厯南赤夏鍭德𣗳評事靖台兩蘄學顔子愚少宰慶東雪洪璵宗器吏侍統浙榖于榖山瓜涇徐源副都𢎞蘇橫顧瑮英玉副使靖南少雒于仁評事厯秦木周復俊子籲太僕靖崑石陸杰元望工侍慶秀金庭朱賡少欽閣臣厯越周公鼐孝與禮侍厯東槐蔡承植少卿厯楚蘭謝徽𤣥懿編修初蘇立孫丕揚叔孝太宰厯秦念劉伯淵靜之副使厯越翠林茂逹孚可大理靖檜鄭桓居貞參政建歙西亭朱睦㮮灌甫中尉厯初程啓充以道御史靖川希入熙字荷盧格正夫御史德婺泉吳鼎維新參議靖杭溪嚴鳯季祥知府靖湖溝張天永長年雪蓬殿學初常幾熊釗伯璣初江陳龍正發郊惕龍禮部末秀韶張四知子畏僉事厯河熙艾穆和父純卿中丞厯楚六陳宗虞子韶副使厯水樂頀舜儀少卿靖江石陳沂魯南太僕靖南竹王沂子與運同初江陳明水雨陳瓉廷祼刑侍慶蘇改方鳯時鳴御史靖崑丁賔禮原司空厯秀抑陳抑菴桂李汝華户書啓河草周昉元亮西崦初杭彭黯刑書靖江素方向與義知府德皖敬張綸大經右都德南海黃卿時庸布政靖東楚楊德政公亮按察厯鄞野沈鉉文舉徴士初松劉忠司直閣老德汴錢同愛孔周處士靖蘇矯方鵬時舉太常靖崑禮冦慎兩司禎秦南屏潘辰時用常少德處葵張景明廷光長史德越岱崔元京山侯靖瑞顧錫疇九疇禮書末崑後盧勳汝立刑書靖處雪趙部院靖滇翠張以寧志道學士初閩張朂勉夫參政順蘇三汀陸儼山秋周瑞訓導德崑松李獻可禮科厯閩歐頓鋭懷玉長史靖北蒲李廷相夢弼禮書靖東蘭梁有譽公實主事靖粵石殷正茂養實户書厯歙東溟范鏓平甫兵侍靖鏓管志道登之僉憲厯蘇南汪道崑伯玉太函兵侍厯歙秋殷邁時訓宗伯厯南滄李攀龍于鱗按察靖東鯤郭諫臣子忠參政厯蘇四謝榛茂秦山人慶東三洲沈淮􅊹伯通政慶杭元陸五湖張瀚子文吏書厯杭𤣥全天叙伯典詹事厯鄞平方邦望表民推官靖閩方張寧靖之知府成秀楊名實卿編修靖川芳陳循德遵閣臣順江俞泰國昌參政靖常洪朝選汝尹舜臣刑侍厯閩王章漢臣御史禎常西唐胄平侯户侍靖粵東胡榮希仁提學成江屠僑安卿左都靖鄞崔桐來鳯禮侍靖揚夏良勝于中文選靖江田樂兵書厯北洪王圻元翰參議慶蘇湘李騰芳子實禮書禎楚滄周愷子諒灌夫郎署初江朱芾孟辨中書初松陳亮景明處士初閩張泰亨父修撰𢎞崑錢貢時庸刑郎慶秀晴程信廷實司馬篁墩父康羅萬化一甫禮書厯越環莘野奴耕巡檢初湖吳兌君澤兵書厯越鴻徐三重伯同主事厯松麟楊茂元志仁刑侍守陳子王世𢡟敬美常少鳯洲弟十仇英實甫畫史靖蘇方九叙禹績承天厯杭大趙貞吉孟靜閣老慶川少馮惟訥汝言光祿閭山子水魏良弼師說給諫靖江白李士實若虛右都德江玉朱曜叔𤾉提舉靖半張經廷彛兵書靖閩兩王學䕫唐卿兵書靖江矩黃衷子和兵侍靖粵雪黃瓉公獻兵侍德揚桂夏言公謹閣老靖江笋顧天叙禮初知縣瑞屏父籙周順昌景文吏部啓蘇藥田汝成叔禾豫陽參議靖杭鳯王世貞元美弇州司冦厯蘇鶴包聖師聖同知初常梅友松總督厯黔徐標凖明督撫末東鬱梁儲藏用叔厚閣老德粵虛舟王稱孟揚龜巢檢討永閩陳梧岡鄭若庸中伯山人厯崑鄧雲霄𤣥度參政啓粵蓮王曰銓鮒鰅山人厯北霞吳鍾巒巒稚宗伯末常雨王濟伯雨州判靖湖海吳宏濟春陽臺中厯秀丹邱姚綬公綬雲東御史成秀青髙啓季迪太史初蘇邵正已格之山人靖歙浮盧柟少楩子木太學慶北李敏功甫山人厯歙左滄嶼湄邢宥克寬副都成粵前𫝊汝舟木虛磊老山人靖閩葵謝晋孔昭深翠山人成蘇楓張嵿子謙工書靖越椒何喬新廷秀刑書𢎞江環鄧渼逺逰僉都啓江川樓吳國倫明卿甔甀參政厯楚西王磐鴻漸山人靖揚鄧原嶽汝髙副使厯閩江錢宏可容巡撫靖杭枝髙倬刑書末川月倪敬汝敬御史順常白吳一鵬南夫吏書德蘇易應昌侍郎末江石徐學聚敬輿巡撫啓婺海凌儒真卿僉都厯揚鶴張翀子儀刑侍厯桞州珠林劉松子髙司業初江章周軫公載按察治閩雲劉效祖仲修副使慶東楓朱升允升學士初歙梅胡宗憲汝欽司馬靖歙月邱蕣懋賞吏書厯東少沈𢡟學君典狀元古林子古沈寵思畏參政慶南王元敬廷臣兵侍厯越何天山參政石祝世祿無功尚寶厯江道蔣信卿實提學靖楚雪曹幼交永松鶴杜松成青總兵厯秦别號録卷七
