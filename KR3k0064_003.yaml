body:
  text: 别號録卷三崑山葛萬里撰西陂劉儲秀士竒司馬靖秦射朱曰藩子价知府凌溪子渼王九思敬夫知州靖秦漢屠本畯田叔豳叟運使竹墟子天池徐渭文長青藤山人慶越陸采子𤣥秀才貞山弟嚴􅊹道澈知府養齋子隆彭年孔嘉布衣慶蘓龍王道行明佐甫方伯慶晉鵞宋登春應元山人厯北蘭虞堪克用勝伯廣文初呉又王宗載左都厯楚玉徐豐崕史孟麟際明太常厯常墨王舜鼎工書啟越鶴余承恩參將靖川鑑李際春和元按察厯楚中溪李元陽仁甫太守靖滇吾徐楚世望參政厯浙西鮑恂仲孚秀民徴士初秀李平季衡廣文南莊弟周旋克敬參政徳鄞任洛仲伊兵侍靖楚袁公冕通判靖東龍霓致仁副使靖江繆昌期當時諭徳啟常東謝常彥明文學宣蘓姜立綱廷憲僕少成浙熊卓士𨕖御史徳江南丁闕兵書靖呉昻徳翼布政靖秀張􅀈鵠舉户侍靖揚沙孫緒誠甫太僕靖北曹逵履中副使厯蘓洪衷貞吉孔安總憲厯江浯汪叡仲魯一貞春坊初芳江東伯陽總督靖東貞邵亨貞復孺司訓初青倪岳舜咨太宰𢎞南清趙鑑克正司㓂靖東錢啟忠沃心提學末鄞松戴珊廷珍總憲𢎞江崔文奎工書靖東程文徳舜敷吏侍靖婺桐錢如京公溥刑書靖皖梓舒芬國裳石灘修撰靖江亭張潮惟信禮書靖川前景𤾉伯時中允靖揚曽鈞廷和刑侍慶江寒方太古元素一壺處士靖婺陽林命子順按察厯閩華沈夢麟原昭徴士初湖郭應聘君實尚書厯閩蓉金獻民舜舉司馬靖川簡霄騰芳兵侍靖江凌朱應登升之按察徳揚琴陳寰原大祭酒虞山弟端王崇慶徳徴太宰靖北臨張永明鍾誠總憲靖湖峯孫璽朝信僉事靖秀䝉胡侍永承之州判靖秦張鏊濟甫兵書靖江潜宋濓景濓青蘿承㫖槎張輅行素初杭劉珠林横歐陽塾工侍南野弟璜董天錫夀甫大理圭峯子篁祝鑾鳴和布政靖南鳧鈕仲玉貞甫處士靖蘓龍孫泰時寅知府靖湖王畿汝中武𨕖厯越雙劉震道亨祭酒𢎞江杭淮東卿户侍徳呉熊偉彥卿巡撫靖北月隂武卿兵書厯川介嚴嵩惟中右謝庭蘭子佩給事靖川倫以諒彥周通參迂岡子半李丙子南知縣靖川五萬潮汝信提學靖川玉張亭溪石周叙公叙學士統江韓士英廷延户書靖川王希旦維周儀部靖閩陸銓𨕖之布政靖鄞竹趙昻伯顒通參𢎞北魏時敏縣丞徳閩守王鏊濟之閣老徳蘓次李汶兵書厯北兩劉球廷振求樂侍講統江駱文盛質甫編修靖湖葛浩天宏大理靖浙萬恭肅卿洞陽司馬厯江董兩湖定方新徳新參政慶南近羅汝芳惟徳大參慶江朴潘潢薦叔兵書靖歙柘凌柘軒栁懷鐵松沅何鰲刑書石湖子晉王瓊徳華兵書徳晉鹿周鑣仲馭儀部永南雪趙次誠學之初温蘓平秉衡文學景杭箬顧應祥惟賢刑書靖湖訥周都峯後丁士美邦彥吏侍厯淮紫蘓濬君禹提學厯閩魯戴書天錫廵撫靖楚範鄭洛禹秀兵書厯北簟馮京第躋仲御史末鄞續李國􅕠元冶閣臣禎北文水文嘉休承學正衡山子王象春季木考工厯東方鄭以偉子器如蓮閣臣禎江明陳九川惟濬郎中靖江秋陳汝言惟允經厯初蘓莫少江涂㓂天叙子惇兵侍靖晉蒼魏濬禹欽廵撫啟閩張煌言𤣥箸司馬末鄞二張瑞圖閣臣禎閩石蘓茂相𢎞家弼垣刑書啟閩赤屠隆長卿緯真儀部厯鄞弱楊鶴修齡總督嗣昌父彭期生觀民太常末秀蓼朱延禧允修閣臣禎東青居陳松谷萍唐之淳愚士侍讀丹崕子雲劉日寧幼安雲嶠禮侍厯江端張鶴村亦稱端白檉杜堇懼男古狂徳東原名謹别號青霞樓常倫明卿評事徳晉霞高瀫宗予呂髼仙霞仙慶閩竹朱勤羮王孫西亭子雪孫克𢎞允執克宇知府毅齋子廣傅光宅伯俊副使厯東靜張羽來儀附鳯司丞三渠王用賓元允興吏書靖秦南李呂本汝立閣臣靖越王爌存約總憲靖台前李嵩子中布政靖河莊魏校子才太常靖崑清劉體乾子元司農慶闕雙毛鵬汝南巡撫靖北午余曰徳徳甫副使厯江後崔銑子鍾仲鳧禮侍靖河順王道純甫吏侍靖東翠周瑛梁石䝉中方伯𢎞閩柴墟儲巏静夫吏侍徳揚梅周履靖逸之梅癲厯呉少馮従吾仲好中丞啟秦斗殷都開無美海岱部即厯蘓竹屠大山國望兵侍東洲姪三湖邢珣子用布政靖南方曹𢎞毅之御史靖常玉詢侍郎靖川東汪徳鈞叔達初歙屠勲元勲刑書徳秀周玉朝振祭酒靖台錢仁夫士𢎞水部靖蘓呉廷舉獻臣司空靖全州陸炳緹帥靖南丁奉獻之吏部靖蘓余本子華通政靖鄞張綖世文知州靖揚青汪應軫子宿僉事靖越昆瞿景淳師道禮侍靖蘓金方逢時行之兵書厯楚蓉陳䇿嘉言布政徳常梅林文秩按察統閩敧馬應祥公順副使靖秦陽王庭直夫參議靖蘓瑤王臣公弼參議靖江峰孫峰溪龍張治文邦閣老靖楚李禿翁鵞龔斆四輔初江費宏子充湖東閣老靖江雙戴經孟常潯陽知州徳秀謝廷柱邦用僉事慶閩少徐存齋王敬臣以道少陽國博陽湖子月楊亷方震宗伯靖江周寅所白趙廸景哲永閩文森宗嚴僉都靖蘓石何詔廷綸工書靖越呉愚菴五張習企翺提學𢎞蘓陸師道子𫝊少卿慶蘓兩陳昌積子虚龍津符卿慶江董穀碩父知府蘿石子汝謝丕以中吏侍遷子旺呉嶽汝喬太宰慶東柘王梅時魁刑郎慶秀何良俊登之元朗孔目慶松雪馮蘭佩之提學徳越望呉旺湖徐達齋嶼秦鉞懋功巡撫靖鄞鏡熊桴元乗巡撫厯楚鑑孫如游景文閣臣啟越文所馮時可元成副使南江子貞馮岳望之刑書靖鄞東張詡廷實通參徳粤容呉小江寅周應賓嘉甫禮書厯鄞嚴清直甫太宰厯滇乾趙邦清仲一參議啟秦誠馬經綸主一御史厯北瓢林敏漠孟徴士初閩謙馮貞所一金賁亨汝白提學靖台竹俞敏徳鳴謙靖浙定俞霑時澤副使厯常董光宏君謨兵侍啟鄞抑唐文獻元徴禮侍厯呉畏劉臺國基御史厯江敬胡拱辰共之工書成浙蔣湘臯王宗沐新甫龍陽刑侍厯台復楊起元貞復少宰厯粤慎丁元薦長孺禮部厯湖傅應禎公善大理厯江豫呂調陽和卿閣臣厯桂林西嶼簡紹芳西壆慶川青陳世良崇之僉都𢎞台芸丁義宜民部郎初江滄左光斗拱之遺直中丞啟皖楊鎬經畧啟河瀛夏尚時正季爵大理成杭白金鑾在衡山人厯秦鶴汪康謠唐徴副使禎歙冲宇顔鯨應雷提學厯鄞南高儀子象閣臣慶杭春牛應元子仁刑侍厯秦賈待問學叔春容兵書厯闕希入熙宇珍曹于汴自梁真予左都禎晉康王象晉藎臣布政見峯子熈郭惟賢副都慶閩袁化中御史啟東惺陳大道蘓嶺户書啟楚誠張問達吏書啟秦謙林堯俞咨伯禮書啟閩古方初菴定鄧以讃汝徳少宰厯江趙用賢汝師少宰厯蘓敬丁改亭澹阮自華堅之知府啟皖鏡沈節甫以安工侍厯湖霽王象乾子廓兵書啟東别號錄卷三
