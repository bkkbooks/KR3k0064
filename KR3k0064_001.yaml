body:
  text: 别號錄卷一崑山葛萬里撰花翁孫惟信季蕃荃翁張端義正夫涪黄山谷村仇山村巖龔翠巖臞敖臞菴了陳了齋止饒延年伯永足周珩坎張翰雲卿放陸游務觀夏𢎞毅所陳容公儲拙黎獻子文長陳造唐卿病劉屏山眚翁蘓後湖退翁尤台公輔倦岳亦齋浪李琴軒野杜俣碩父郭翼羲仲元散阮一閲宏休遂蔣堂希魯遯朱晦菴陳遯齋醉翁竹林饒醉樵黙龎鑄才卿金懶曾揆舜卿三松王子俊才臣青松俞灝商卿雲陸居仁宅之元蒼錢伯元六吕起猷元赤黄炳千峰陳宗禮立之圭峰盧圭齋南龔郯曇伯高廖剛用中竒徐麟元梅阮秀實雲胡炳文仲虎元蛟方逢辰君錫湖陸景龍德陽元齊周彦質文之蓮周綰彦紉史堯闕易斗元太初喬逢辰君章金龜彭巖肖陳經國龍劉砥履之闕雙謝履履道北北宋饒魯伯與舒邦佐平叔姚獬孫應車垓經臣元一峰黄公望子乆大癡元九林摶圖南北蘓元老在廷蔡沈仲黙七鄧寗仲吉北六尹廷高仲明玉井元五胡宏仁仲翁挺仕挺翁孟寅賓暘李孝光季和元玉楊公度元宏車若水清臣趙可獻之金石洪震老復翁元妙林遹述中海張慶之子善栲岑安卿静能元華張起巖夢臣元雪闕碧李闕天錫元鼎趙良鈞錦王仲元清卿金象薛漢宗海元寶趙偕子永元斛李闕伯玉鐵張山翁鄮史浩直翁霽李洧三江魯交東江謝深甫子肅秋黄一清清夫元清傅玉樓湘朱翼新仲蒲盧祖臯申之曲江錢惟善思復心白元錦范梈徳機元導張䇓達善西牕徐安國衡仲南牕劉凖東張擴彦實呉子文容劉聞元芸張榘方叔松錢端禮處和北陸域中卿鄭斗煥丙文葵周端臣彦良篔陳耆卿夀老石史文卿景賢元竹沈禧廷錫元余青陽北姚原子東余觀復中行草周密公謹髙龍光申甫雪張良臣武子孫呉㑹楚望寄嚴滋㤗伯夢呉文英君特中陽王珪君璋元弁陽周草窗初柳貫道傳元河郭熙淳夫東滕茂實秀頴青余闕廷心元桐汪鼎鎮卿雲李祁一初元陵韓駒子蒼李道傳仲貫牟巘獻之元谷朱之純龔璛子敬元華范祖禹淳夫王珪禹玉北林頥夀褒世張綱彦正譚知柔勝仲闕紫朱晦庵方虚谷張伯端平叔楊煥知章元松鄉任士林叔實元拙鄉王誼正仲道鄒浩志完韻黄淵仲元四如天叟元山房周南南仲方逢振君玉林夢英叔虎篔李彭老商𨼆竹吾丘衍子行元葯呉景奎文可元西莊趙希普宋卿闕雲劉爚晦伯曽協陳澔可大元張養浩希孟漁潘希白懷古北舒逺仲修元竹胡仲參希道呉瓘瑩之元栁何穀成廷珪禮執元菊魏醇父慶之葯范晞文景文漫顧禧景繁靜柴潛道元山堂章如愚俊卿西堂范應鈴旂叟東堂毛滂澤民北冷世光賓王南鄒斌松張邦彦彦才金秋李演廣翁陳善敬甫柴望仲山邵闕元茆胡寧和仲程令說彦舉溪謝逸無逸俞汝尚退翁北王相如次卿方有開躬明傅崧卿子駿熙黄遹景聲霖朱之才師美金撝劉炎潛夫融錢時子是章環溪頥王灼晦叔湯邦彦徳美可呉仲迂元自陳杰石陳普尚徳元竹張公藥元石金志王珪肯李仲光景温則家鉉翁闕拙劉大中立道牧蔡𤼵神與悦楊楫通老草魏野仲先葛密子𤼵張覺民北劉白水方秉白直甫李邴漢老謝鑰闕桂堂謝安時尚可致堂胡寅明仲逸司馬棫才叔慥鄭雄飛景温元野沈揆賀庸元紹俞空谷義湯建達可漫鄧元南秀觀劉之望黙陳淵知黙薺馬定國子卿金方塘趙闕元楊維翰子固圭許有壬可用元西鄭俠介夫南趙汝談履常陳柏茂卿元東袁說友起巖呉周才仲美元横許景衡少伊林桷子長章同丹霞元驪危㢲齋石林寒齋胡長孺汲仲元漫劉宰平國蓼莊肅幼恭元練洪興祖慶善西岡吕大鵬鵬舉金東岡許熙載獻臣元秋陳思濟濟民元前果囉羅納延易之梧臧廷鳳茆倪天𨼆北龍鄭闕景賢元董朴柘羅天酉恭甫鳳陳堯舉硯岡唐稷堯弼夀岡楊愿三溪李南金文溪李昴英俊明丹朱震亨彦修元平漆希范文翁元西沈遘文通北李過姚寛令威劉琴軒卓立志道秦畧簡夫金段思義季方元鮮于樞伯機東黄亢北沈詵宜之高登彦先甘泳泳之南柴中行與之梁至剛浩然元芹丘復齋段思誠仲明元松范濬李天麟潘從善擇可元桃李蘩楓施乗之梧王逢原吉席㡌元梅王十朋龜齡曽和應賢叔史達祖邦卿傅光龍子才元梁李漫叟尤袤延之遂初姑李之儀端叔北曹筠元苕胡仔元任劉一止行簡前溪劉涇巨濟香溪范浚茂明菱謝文龍徳翔北筠李彌遜侣之雲華鎮吕皓子陽魏子敬羅有開元雷魏道明元道金劉樵菴秦王構嗣能元䂬黄徹常明涎丁黼須劉辰翁㑹孟清汪革信民李璆徐唐佐夏乾錫溳鄭獬毅夫浮汪藻彦章漁余桂滋蘓天爵伯修元潜范温元實瀘王庭珪民瞻濂周敦頥茂叔藍謝舉廉民師遥熊凱元聞李文溪槎廖徳明子晦横馮延登子駿金檆孔傳世文劉才邵美中環章元崇徳昂呉沆臺何鎬盤張廷玉金龜沈與求必先和仲麟鄭順卿元龍宇文虚中叔通金支渭興元雙溪王炎晦叔徐椿年夀卿蘓籀蘓大璋顒之曹冠宗臣馮熙之取洽月李宣之陳以莊敬叟北陳淳安卿五馮溥元玉吕大臨與叔芸閣北倪濤巨濟王霆定叟林闕逢吉盧孝孫竹程節信叔北林鬳齋孫伯和徐嶢党懷英世傑金陳洄元闕合戴侗字楊岊陽昌朝兩于紫巖若劉珏希范柳劉鐸文仲金㢲陳敬叟炳然晉任山北剡商日新雪王銍性之宋耕常詵孫直卿陸淞子逸王庭筠子端黄華金金茘陳旅衆仲元葦趙竹𨼆夢溪沈括存中北語溪莫若沖子謙後劉光祖徳修濟李迎彥將錦杜佺真卿金寶葛樂閒鶴陳汝錫師予北籍胡憲原仲芹西徐泰元梅西郭隚雲陸叡景思曹知白又𤣥元竹王剛中居正楊謙元仁里干文傳夀道元西里趙希邁瑞行東楊朴契𤣥北旴掲祐民元七江端友子我平水毛麾牧達金洹水史公奕季宏金泫眺㑹公錫金涑司馬光君實迂叟北淇李清臣邦直北樵黄清老子肅元白劉勉之致中引宋慶之元積洺程珌懷古浭盧啟臣雲叔金野陳諤古直浚王世賞彦功金滏趙閒閒潏李復履中山居陳必復无咎劉元高仲山田黄景昌清逺元芸陳起宗之貞張雨伯雨勾曲元深馮去非可遷瓜廬薛師石景石匡廬于立彥成元梅陳闕景明蓬史公珽搢叟元蝸程俱致道草呉澄幼清元于湖張孝祥安國方湖胡仲雲東徐俯師川方寀徳載元南杜曄良仲何恪懋恭靖天民達卿金貢悦性之友初元慈楊簡敬仲王幼學元龜王萊雙胡一桂庭芳元月莫君陳和中北江開開之何異同叔日鄭昭先石范成大致能莫敏元北呉則禮子副姚宋佐輔之半何光大謙履闕雁李璧季章後蘓庠養直練武允蹈徳由慶賀鑄方回北燭孫應時季和鑑趙子崧梅所葉宗仁元止所陳虞之雲翁竹所趙孟淳子真徐集孫義夫石董公偃安義北東浦黄簡元易韓玉温父金秋鄭伯淵横張九成子韶無垢吾圃洪巖虎𤣥圃燮闕元老洪芻駒父史大𨼆退馬寧祖奉先元樂朱長文伯原北方崕闕冰崕蕭立之東劉岳公泰元青魏鑑太初元秋方岳巨山奚㵄倬然李萊老周𨼆惠希孟元乖張詠復之北梅張槃叔安霜侯畐道子蒼潘昂霄元雪章康季思鐡楊維楨廉夫元山齋易祓彥輝衞謙有山元實喇卜敬臣方劉夢桂中楊鎮子仁董楷克正正翁鄧剡光薦中甫留夢炎元心董徳修仲修仁陳駿敏仲平洪咨夔舜俞申劉岳申元圭齋歐陽𤣥元功元盧𤦺希韓存陳經正甫鄭師孟齊卿林憲卿公度楊枋羅願端良牟子才存叟黄鎮成元鎮𢎞李燔子敬宏包闕宏父迂李樗若林樓昉暘叔周馳仲才金西趙闕仲光元東陳鑒之剛父陳大猷芸喬彝元忠劉闕元空林同子真宜呉枋容洪邁景盧野處高曇子雲唐廷瑞君祥徐琰子方元高陳舜申宋謨曽慥端伯初王良玉懷璞元休陳知柔體仁成黄雲鼎瑞景祥眉鄭楷持正時趙綸北沈義甫伯時俞奕曽唯父元思翁泳永叔垣黄學行上文湖朱谷陽寒林公遇養正閒眺端禮虚齋趙以夫用甫鄧林楚材曹翰卿怡馮大有顧癡叟恒王維臣以忠元葛應雷震父惺王清叔修蔡範遵甫韋徐澄清伯朱松喬年張琚子玉金常魏闕堅樓鑰大防攻愧强彭方季正踈盧摯處道元通葉瘖叟茆馬擴竇黙漢卿元萍林彖商卿雲李獻民勤蕭㪺維斗元乾陸仁良貴元誠楊萬里廷秀林坤載卿陳震愚史鑄高伯壎汝諧䝉范端臣元卿鄭景望盛明叟蔡正孫粹然袁甫廣微李簡元庸宋斌許仲翔鄭文遹沈說惟肖梁益友直元潜王埜子文何夢桂申甫陳剛公潛元溪滕璘徳粹酸蘇爾約蘇哈雅浮岑元樗朱允恭爾靖橋杜旟伯高齊倪思正甫謙呉梅卿清之元彜趙孟堅子固元商琥臺符頥劉季裴張衍元張徳輝耀卿疇張仲夀希静元一李鑑汝明了陳瓘瑩中止陳傅良君舉徐珦温父石笑齋王艮元張翼飛卿井虞汲元勿毛存程若庸達原以曹鏗克明黄章仲珍元立王偘剛仲司庠公序元本王都中邦翰浮光元魯淵道原元可李曾伯盧珏登父陳塏子爽元且敖仲實竹齋黄機幾叔裘萬頃元量沈瀛子夀安思承元王老村玉胡方平守楊纘繼翁合王柟木叔亦岳珂肅之任柯丹丘定林淳太和黄鍾器之鄭士懿蔡戡定夫汪一龍逺翔元李獻卿欽止志鄭穎茂叔忍申志逺大用元克余隅游佀景仁呉真子陳文蔚才卿沈端節約之董楷正俞張楷元單慶艮謝諤成之昌國魏掞之子實薛士龍季宣肯李芾闕性楊應龍汝濟見馮允中作肅冷魯訔浩孫龍坡泳楊伯巖彥瞻洞劉華甫元拙林之竒少頴曽楙高頥元齡王大受仲可玩齋貢師泰泰甫友迂元邾經仲誼挺周徳清元矴張舜民芸叟浮休北笏陳孚剛中元放曹粹中純老果魏文翁李方子正叔公晦李之紹伯宗元杲鄭東季明元格范子長核陳羲信楊復志仁葛郯謙問唯鄭曽子子可受游九功勉之直陳闕振孫陳伯玉薩都拉天錫趙孟瀠君澤畏尚希尹莘老游桂元𤼵蔡開子明程端禮敬叔元退侯延慶季長熊勿軒進徐幾子與恪嚴度元省昝定國廖行之天民周平園闕張泳潛夫呉獬糜弇仲昭闕息齋高閌抑崇李衎仲賓元恕汪綱仲舉謝升賢景芳班恕惟志彥功元强珇彥栗闕是王信習鄭奕夫景允凖呉如愚建黄極建可元著高定之瞻叔笑石正行厚馮椅竒之王應麟伯厚詹載采元約張鎡功父與田疇寓沈右仲說元栗鞏豐仲至慥林大春熙之㢲危稹逢吉歐陽守道公權得馬壬仲次辛勉黄榦直卿裕段輔惟徳元順蒲道源得之元惠呉廸泰之善唐如晦幼光敬王佐宣之汪清卿湛仲周天駿子美呉鎰仲權李冶仁卿元姚雪齋義石鵬陸垕元野周文璞普仙山楹闕李謙受益郭昂彥高朔劉震孫雪王咨夢得王黙子章趙子覺彥先姚樞公茂元訥程元鳳瑞甫王訥王毅剛叔元鈍楊濟濟道說唐仲友與政輔仁呉楫公濟李􅌫謹夏若水元飲周奭損李獻能欽叔金益陸埈子高張攀従龍王吉才元肅潘從大密劉闕晦叔元審王千秋錫老實王遂頴叔去非劉應龍漢臣張道洽澤民蔣重珍良貴一梅逺李浹兼善虞復從道程雪樓達呉應紫適袁去華宣卿汪大猷仲嘉柴楨君正元謝俊民章甫遯陳正敏王元節子元金叚克己復之遜商璹臺元元復齋王秬嘉叟王厚之陸九齡子夀董琮玉振李次魚黄㽦子耕丘義通濟陳宓師復龔相趙彦橚子欽鬳林希逸肅翁艇曽季貍裘甫擇徐明叔仲晦撙曽丰幼度魯洪芹叔魯鮑雲龍景翔北曽守約趙與東賓暘闕王侗元王栢㑹之許衡仲平樂向鎬豐之藴吕律北節蔡淵伯靜呉載堅趙與􅊸徳淵潘榮伯誠元劉珏簡陳與義去非張宗演元澹李流謙黄夢炎子暘高澹菴澈陶崇宗山潔袁夑和叔黙游九言訥夫王應鳳仲儀陳成父玉汝學史繩祖方輗叔行毅沈貴瑤徐僑崇父何景文觀柴杰履方大壯履之呉潛毅夫橘史杠柔明元櫟衛湜正叔嘯周晉明叔癖杜旃仲高靜劉謐劉垕伯醇茅汝元張闕敏則汪夀警黄蜕懼