front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0064_WYG_004-1a, image: WYG1034/WYG1034-0163a.png}
body:
  text: 别號録卷四崑山葛萬里撰三崕歐陽重子重僉都靖江丹唐肅處敬應奉初越方趙大佑世𦙍刑書慶浙平錢嶫君望参政慶揚東許進季升太宰徳河李旻子陽吏侍徳杭翁萬逹仁夫司馬靖粤王璧宗順逸叟處士心齋子黄景昉太穉閣臣末閩青耿裕好問太宰九疇子邉華泉秋朱紈子純中丞靖蘇殷秋溟松戴松溪方良永壽卿司冦靖閩梅鄒亮克明御史景蘇横陳芹子野知縣厯南崑鄭崑巖豐徐泰子元知縣東濱兄龜蔡紹科知府靖台䨇周忱恂如工書景江八周廷用子賢按察靖楚九余文獻伯初提學慶江兀霍渭崕大李承箕世卿孝亷𢎞楚古呉溥徳􅃳司業康齋父樊阜時登廣文成處水彭􅇐景俊布政靖江玉范立叔中中立初杭石黄溥按察順江周珫部院靖楚白喬白巖大儒靖北两朱庭立子禮禮侍靖楚次林希元茂貞思獻謫宦靖閩栢張昇啓昭禮書𢎞江雪程國儒邦民知府初歙朱祚永年少卿宣杭渭霍韜渭先禮書靖粤碧張寛徳洪僉事靖崑萬黄卷監司慶楚振即震崕震楊成汝大兵書厯蘇山齋周鳯鳴左丞貞菴子鄭岳汝華兵侍靖楚中秦五峰心王艮汝止大儒靖泰張欽敬之工侍靖北張學顔兵書厯北同沈恒恒吉處士石田父存唐懐徳思誠教諭初婺張昌助教初晋瞿佑宗吉長史永杭趙友同彦如御醫宣浙徐階子升宰輔慶松宏邵經邦仲徳刑書靖杭安朱裳公垂中丞靖北呆劉定之主静閣老成江南沈貞貞吉處士成蘇魏􅂹仲房太宰順越芹龎泮原化布政𢎞浙秋周宣彦通布政靖閩貞江以東貞明學士慶江容顧觀利賔縣尉初南章律鳴鳯副都戒菴弟希柯維騏竒純主事靖閩含曹大章一呈編修厯南成林泮用養戸書徳閩陳璚玉汝中丞徳蘇忠任瀚司直靖川思陳濟伯載春坊永常鄭範溪常王景景彰學士永浙泉邵二泉髙士初蘇虚蔡清介夫祭酒徳閩祝萃維貞提學徳杭王積子崇兵侍􅂟蘇恒儀智禮侍永東期吕南渠吕光洵信卿巡撫厯越韋嚴烜熈叔两司宣閩弦楊璡用璋两司𢎞汴閒汪偉器之少宰石潭弟康呉與弼子傅聘君成江莪陳津道通職方厯蘇葵顧仕隆仲勲襲侯𢎞揚硜髙宏圖子猶閣老末東梅林弼唐臣元凱知府初閩桴顧潜孔昭知府未齋兄誠張士原初江汪鋐宣之吏書靖歙愚林静子山永湖戴洵汝誠祭酒厯鄞䝉韓奕公望髙士初蘇姚肇布政永杭畢昭應舉巡撫靖東謙滕克恭安卿徴聘初河錢遜謙伯主簿宣越徐溥時用閣老𢎞常凝王鴻儒􅅷學戸書徳河劉堯誨君納兵書厯楚一朱善備萬殿閣初江婁諒克貞處士𢎞江豐熈原學學士靖鄞温亦齋陳第季立将軍厯閩了杜質慶南内余敬中子惺按察厯南木謝遷于喬閣老徳越勿陳員韜從熈布政統台徐􅊈九一隅少詹末蘇未荘定山黄未軒顧鼎臣九和閣老靖崑白毛三江張𤦺君玉参政靖鄞正俞芳洲半劉師邵西江子周西溪立左鼎周器右都順江鄒智汝愚吏目𢎞川宋端儀孔時两司徳閩呉洪與疇刑書徳蘇應良在明布政慶台李向中豹韋兵書末楚可彭時純道閣老成江陳鐸大聲秋碧指揮靖南游居敬刑侍靖閩用劉一焜元丙石閭副都是菴兄劉元霖元澤工書復齋弟石陳白沙楊廷和介夫宰輔徳川黄道周㓜𤣥螭若相國末閩企張愷元之運使徳常亦温純希景文縂憲厯秦定王應鵬天宇都院靖鄞周祚天保給事靖越式陸容文量参政𢎞崑克王暐克明戸書靖南李遂邦良兵書靖江艮戴經伯常楚望錦衣靖我蔡宗兖希顔僉事靖越呉亷介夫参議靖台肖楊𫝊芳監司復所父佀晋應槐植吾念冲巡撫厯晋改王思宜學編修直曽孫致黄宗明誠甫侍郎靖鄞念程楷正之編修徳江陶大臨虞臣吏侍南川孫冷聶大年壽卿教諭景江冶陸簡亷伯敬行學士𢎞常治萬鏜仕鳴吏書靖江浣李賢原徳宰輔成河始華嵩峰托温仁和民懐禮書靖川抑鄭閻公望教授統閩鄭一鵬九萬給事靖浙楊允繩翼少給事靖松拙盧彭祖長嬰禮部永崑挹周延儒玉繩閣臣禎常坦劉三吾坦甫學士初楚葉砥履道知府永越陳瑛副都節齋弟栗林温伯㳟長史初浙栢何瑭粹夫都憲靖河易劉璟仲璟閤門基子畏林鶚一鶚刑侍成浙周孟中時可副都治江費傑世産國醫徳薛甲應登副使靖常育髙榖世用閣老統揚悟呉時來帷修右都厯台省徐有貞元之玉天全武功順蘇鄭瑗仲璧郎中徳陳璋宗獻司冦靖台陳克宅布政靖越劉璽廷守信都督靖南恥林垐子野知縣末閩狷謝瑜如卿御史靖越重盧儒為已舍人順崑恕王概同節司冦成江范李甡應禎少卿治蘇矩陳恪克謹大理靖湖理諸爕子相通判靖越素于湛瑩中户侍靖南約費廣孟博御史順川謝一䕫大韶工書成江張紘文儀知府徳松傅好禮太常慶北厚王宇仲宏大理順汴梁欝洲退林雲同汝雨刑書慶閩逺程南雲太常景江王鑑之明仲刑書徳越逹徐陟子明刑侍階弟辣王徽尚文參議𢎞南悔李遜學希顔禮書徳河揚呉易日生司馬末蘇愧陳音師召太常治閩聚陳文閣臣成江植曽朝節直卿禮侍厯楚敬薛敬軒胡居仁淑心大儒𢎞江勉霍與霞勉衷僉事韜子朱之馮徳止樂三巡撫禎北朂韓詩承志同知厯蘇𥙷丁璣玉夫提學𢎞􅃳執劉玉咸栗刑侍靖江益陳奎文表布政靖江趙承謙徳光参議定宇父綗林環崇璧侍講永閩陳桭叔剛侍讀宣葉春及化甫石洞户郎慶粤魯章允儒珍甫給諫末江訒余祐子積少宰靖江訥周都峰朱維京大可寺丞鎮山子納陳彦回士淵太守建閩檢李文祥天瑞郎官𢎞楚健費鵞湖曽乾亨子健大理見䑓弟徳張晟千户𢎞南復髙崇本茂卿逸叟副使順北劉元震元東詹事厯北雅􅀺擴大量教授順江胡執禮户侍厯秦損梅純一之留守𢎞南董朴參政徳楚􅆇應奎賢徵部郎靖湖王麟洲南居益思受二太工書𤾉谷孫歉張芹文林布政靖江鈍徐鑑克明參議成浙蘇大景元甕天布衣成歙謇尹澄江蔀林誌尚黙禮侍宣閩鄭關公啓宣閩笑龔輝實卿工侍慶越節陳瑶仲華工侍徳全州王綸汝言巡撫徳鄞簣周洪謨堯佐禮書靖川陸􅀈秀卿都院靖秀簡劉榮嗣敬仲半舫工書禎北䦣冀維乾元亨舉人徳楚黄承昊履素按察洪憲子􅃀葉禎夢吉同知粤逯中立與權給諫厯東磊呉麟徴聖生來皇常少禎秀澹鄭定孟宣助教初閩漸趙漢鴻逵參政靖秀黙朱雪崖許論兵書進子孫雲從龍副使靖崑奚世亮明仲知府靖楚學姚文灝秀夫提學𢎞江養徐問用中户書靖常嚴訥敏卿閣老慶蘇毅王洪希範翰林宣杭陳振叔紹两司順閩劉乾鴻臚靖常孫承恩貞甫禮書靖松李鉞䖍甫兵書靖汴查鐸子警副使厯南杜三䇿兵侍末東體傅瀚曰川禮書成江静汪仁夀初婺葉子竒世傑主簿初處黄守約仲檢討永閩鄭寕志道都院順汴何衷惟孝大理成江陳闕吏侍靖石永夀卿縂制靖北覺徐琰文卿冏丞階姪蠢邢量用理處士成蘇蠧陳夀本仁刑書徳江礪周如砥季平祭酒厯東天䑓耿定向子衡在倫楚侗右都厯芝陳仁錫明卿祭酒禎蘇春蔡國熈提學厯北劉海村胥𡊮袠永之僉事靖蘇梅曽存仁􅅷逺布政見䑓父蓍馬􅆒抑之御史靖河衡周朝瑞思永僕少啓東瓊邢湄丘丘深菴五陸光祖與䋲太宰靖秀見曽同亨于野太宰厯江念劉宗周起東縂憲末越雪劉節介夫涵節梅國刑侍靖江應傅鳯翔徳輝都院慶楚静杜偉道升工部厯蘇東海宋廣昌裔桐栢永蘇浦源長源舍人初常張弼汝弼知府徳松淮孫應鼇山甫部院厯黔陽王追臯直之知府厯楚漳黄石齋瑶魏照乘閣臣末北鷗楊文卿子質經歴靖北觀顧章志行之兵侍厯崑少任忠齋北馮𤦺用韞琢吾宗伯厯東㓜周天球公瑕秀才慶蘇董傳䇿原漢禮侍慶松見翁大立孺参道生兵書厯越性王爾庸道安行人厯江雪楊眉菴學呉毅尚志博士初江袁黄坤儀了凡職方厯秀滬陳所藴子有太僕厯松嶠王錫侯推官厯閩别號録卷四
