body:
  text: 别號録卷五崑山葛萬里撰東濵徐咸子正太守靖秀陸淞文東光祿子石涇南趙鏜振夫參政靖楚陳登雲御史厯北洨蔡靉天章御史慶北梅王化行學官厯楚甌王瓉思獻禮侍靖溫海趙塤監司慶越澗徐文沔可繩吏部慶衢樵雲李質文彬王相初粵白王皆山沈少林朱右伯賢長史初台唐桂芳仲實山長初歙石沈謐靜夫參議靖秀岫范守已介儒按察厯汴淡吳哲子愚戎幕初松象韓爌虞臣閣老禎晋鳯楊滄嶼懶裴應章元暗吏書厯閩天門郭都賢些菴巡撫末楚江陳白沙蔡道憲元白推官禎閩吳袁玉川青沈仕懋學山人靖杭蔡文範伯華參議厯越吳宗逹去聞閣臣啓常申紹芳維烈户侍瑶泉孫雲張紳仲紳士行藩伯初東管訥時敏長史初松蛟沈一貫肩吾閣臣厯鄞蘇髙叔嗣子業按察靖汴石梁寅孟敬五經初江翟鑾仲鳴閣臣靖東髙霞居海周汝登繼元户侍啓越鹿茅坤順甫副使慶湖江村沈啓口山子由副使靖蘇西史鑑明古處士𢎞蘇東莫禮士敬戶侍初蘇曹邦輔子忠户書靖東周臣舜卿畫史靖蘇南陶宗儀九成辟舉初台桐周鼎汝器疑舫典史統秀桃周顯宗子孝知府慶東雲許相卿伯台台仲九把給事慶杭寒蘇志臯德明右都靖北樵賈應春東陽兵書靖北衢范嵩邦秀工侍靖閩水陸完全卿吏書德蘇石陳鳯羽伯鳴岐山人慶常次楊守謙允亨兵侍靖楚洛黃宏綱正之副使靖江海劉鋭蓄之指揮慶秀鶴張扆子黼翰宸草愚訓導初蘇周愚僉事靖崑西𨼆宋訥仲敏閣學初北無劉易齊園方彛以常郎官初湖梅諸理齊農黃萬崖樗劉儼敬思市舶初杭小趙白湖月祝淵開美舉人末越半唐廣惟勤醫官成湖巽程本立原道僉都建秀心山趙金淮獻浮休靖湖方謝方石張衍慶仲承侍郎靖薛應旗仲常提學靖常天何維柏喬仲吏侍慶粵樊玉衡太常厯楚中蔡毅中宏甫禮侍啓河元席書文同禮書靖川夫梁汝元即何心𨼆厯江丹屠滽朝宗總憲德鄞包俞楨貞木縣令初蘇陸治叔平處士厯蘇平張路天馳畫史靖汴吳秀越賢副使厯湖𤣥李言恭惟寅𤣥素臨淮厯江宏楊士雲從龍給事靖滇洪華鴻山東劉大夏時雍司馬德楚徐九思子慎太守靖江南伍福天錫提學順江黃潤玉孟清提學成鄞潘府孔修太常德越張駿天駿工書德松林椿永年都督靖晋𤣥戚賢秀夫南𤣥給諫靖滁芝胡槩元節總憲宣江荆王憲維綱兵書靖東貞陸粲子餘浚明給諌水村姪長胡翰仲申教授初婺皆王恭安中典籍永閩匡魏源文淵刑書統江虛席春仁同吏侍元山弟明連白石司馬靖江姚淶遂東讀學東泉子泉林瀚亨大太宰德閩湘孫羽侯鵬初給事厯楚禺張半谷函張海兵侍𢎞東尹劉天民希𨼆副使靖東珠李奎伯文從事慶杭康丁藝嶼松孫繼魯道夫中丞靖滇枝祝允明希哲别駕德蘇梓黃嘉善兵書厯東梧李充嗣士修兵書靖川楓章懋德懋暗然祭酒德婺椒楊繼盛仲芳武選靖北恆曹鼐萬鍾德恆閣老統北魚熊開元𤣥年相國末楚黃鄒文盛時鳴户書靖楚崙歐大任楨伯户郎慶粵疏吳悌思誠刑侍慶江寒陳函輝木叔少宰末台陽宋儀望望之華陽大理厯江彭季本明德知府靖越豐孫存性甫布政靖滁賔劉英邦彥竹東𢎞杭張電文光侍郎慶松閭馮裕伯順按察德東衡文徴明徴仲待詔靖蘇橫徐愛曰仁兵曹靖越機錢龍錫稚文閣臣禎松頥安磐公石給事靖川虞陳察原習中丞靖蘇䝉陳嘉謨參政厯江廬胡直正甫觀察慶江瀘張佳𦙍肖甫有南崌崍司馬厯川蘇陳柏子堅副使五嶽父臺葉向髙道卿閣老啓閩龍鮑楠良用户郎𢎞歙王華德曜海日吏書陽明父騮陳褎邦進僉事靖閩鴻王漸逵用儀青蘿主政靖粵華察子潜讀學慶常雙陳元珂仲聲副使靖閩一李延興守成繼本廣文初北鄒守愚君哲户書靖閩二林大輅以乘中丞靖閩楊巍伯謙太宰厯東九喻吳臯全元立汝德禮侍慶鄞仲春龍原仁山人厯秀十談愷守教總督靖常小張靜峰月李文鳯兩司靖廣西五馬金汝礪布政德川半叢蘭庭秀工書靖東王叔果育德西華副使靖溫北龍光冲虛州判靖江李先芳伯承尚寶厯東古桂見山石沈石雲白倫以訓彥式海白禮侍迂岡子石文睿文思博士靖台赤周易時伯提學靖南此林增志任先法幢相國末溫仲汪靜齊徐瓜涇王問子裕寶界僉事靖常林烴貞曜工書庭機子定莊昶孟𤾉郎中德南近劉璣用齊户書德秦兩張璝德潤知府東所父毛良舜臣南寧伯駱用卿原忠員外靖越陳霆震伯水南提學德湖杰嚴時泰應階侍郎靖楚艮范崙子大工書厯潤茗許應元子春布政慶杭冶王礦公范同知厯閩泗鄒德溥汝光洗馬東郭孫洞尹臺崇基禮書慶江劉中藻薦叔相國末閩海王時中道夫兵書靖東别張同敞司馬居正孫見桂蕚子實閣臣靖江念張潑巡撫禎東堇李堂時升工侍德鄞把魏觀知府初楚許雲村鄭文茂寶夫提學慶處秬田頊太素提學靖閩祐馮汝弼惟良給事靖秀峴李仲訓吏科統江景錢邦彥治徴刑書慶蘇理皇甫濓子約道隆同知慶蘇借吳白樓偶田登有年參政靖秦後楊一魁工書厯晋紀曹汴子東巡撫靖楚善何秦廷仁性之工郎靖江夢翁溥德宏刑書慶越楊二山紫胡瓉伯珩工書靖北虎黃得功靖南侯豹卞錫叔孝吏部厯鳯秦金國聲尚書靖常鶴陸震汝亨駕部德婺王激子揚祭酒靖溫質黃姫水淳父秀才五嶽子蕺劉念臺簣陸簣齊斛楊爵子修御史靖秦甑張緒無意郎官厯楚緒錢寬德洪洪甫刑曹慶越蹟周天佐宇弼户主靖閩鄮蔡錫廷豫巡撫統鄞對康海德涵滸西修撰靖秦林燫貞恆禮書庭機子漫曹嘉仲禮布政靖秦漸屠應埈文升諭德東湖子鏡李汛彥夫知府靖歙何喬逺稚孝匪莪戶侍厯閩鎮朱衡士南工書慶江榖于慎行可逺無垢閣學厯東繼王鑑汝明鴻臚仲山子沈思孝純甫右都厯秀儼周延南喬總憲靖江陸深子淵詹事靖秦平田管揖中丞靖秦西樊深侍郎慶東馬中錫天祿左都德北雲彭綱性仁提學靖崑邢玠搢伯兵書厯東梅顔頥夀天和刑書靖楚溪馬理伯循光祿靖秦石鎦渙彥亨山長初越沈周啓南處士德蘇竹林廷選工書德閩鶴蔡雲程亨之刑書靖台别號録卷五
