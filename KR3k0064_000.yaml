body:
  text: 别號錄𩔖書𩔖提要臣等謹案别號錄九卷國朝葛萬里撰萬里號夢航崑山人其書取宋金元明人别號以下一字分韻編輯宋金元人共一卷明人八卷考錢曽讀書敏求記載有宋淳祐間錢塘徐光浦自號錄一卷載當代名公鉅卿騷人墨士之號譚友聞序之其本為元至正間華亭孫道明所鈔今未之見萬里此書蓋仿其例而廣之者也古人冠而稱字年過五十稱伯仲而已至左傳所載子産子美至於兩字並行已難辨識然猶無别號商山四皓皆自有名姓而又有黄綺諸稱其别號之所仿乎自唐以後名目彌繁萬里謂盛於南宋濫於明見者莫知為誰誠為確論惟其體例茍簡每韻惟第一人標兩字以下皆但標一字驟觀殊不了了又宋金元但註時代明人則兼註爵里而爵止兩字里止一字亦費推求其中如坡韻收蘇軾之東坡而翁韻乃遺歐陽修之醉翁失之眉睫亦多遺漏要其採摭之勤頗足以資考據雖似瑣屑而於史學實有所補楊萬里之於院吏固時得一字師未可概以淺陋斥之也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀别號錄序别號盛于南宋濫于明見者莫識為誰某余所覩記用韻𩔖之頗易撿括自慚固陋攷索未周然厯代文章節義功名道徳之人大半入焉陳之几案可當指掌之圖擕之行笈應施負版之敬夢航居士書凡例四條孤單之號無資攷索者未及錄身兼多號韻未収者間附名下稱塘又稱川號園又號軒等容有𫝊譌姑備列以便查閲同音方芳雲筠隆龍希熙日石介戒笑嘯淡澹諸字與聲音相近菴巖景敬孟夢等字又某原某源某亭某庭某林某陵等或係𫝊訛或本通用不及備載某齋某菴等人尊之曰某翁某翁不繁載
