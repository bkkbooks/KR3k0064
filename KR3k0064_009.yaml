body:
  text: 别號録卷九崑山葛萬里撰王屋張之象𤣥超月鹿經歷慶松朱期至子得知府厯楚舟郭文仲炳文學宣川林蔡羽九逵左虛孔目靖蘇華汪逸遺民山人末雲顧琳知州越石彭簮知州靖江海姚翼翔卿知縣厯湖𣗳申屠衡仲權修撰初蘇文谷孔天𦙍汝錫管涔布政慶晋天薛三省魯叔宗伯啓鄞東湯𦙍績公讓參將統徐瓊時庸禮書德江敖英子發布政靖江孫應奎户書靖河鄭延世昌提舉淡泉祖張潜用昭參政靖江𤣥沈魯誠學心田文學順崑長徐獻忠伯臣知縣慶松函許誥廷綸户書東崖子秋崔世召徴仲知州末松林鍾仲鏞參政永崑陳以勤逸甫閣老慶川商居節士貞布衣厯蘇春汪宗元子允府尹靖楚潘髙子抑參議靖晋虛賀學仁知忍中書厯南涇王愛仁甫參政厯北潜鄧元錫汝極待詔厯江梅梁仲仁大舉州判永杭何英積中處士宣江𤾉方良曙子賓京兆厯歙南軒叔後參議姜泉子王肅菴王叔杲陽德參政厯溫愚李舜臣𢡟欽夢虞太僕靖東蒼王尚綗錦夫布政靖河蒲岑萬體一布政靖粵龍程𤣥輔叔朋布衣靖歙蘭鄒應龍雲卿副都靖秦二侯一元舜舉布政慶溫大溫新伯明主事靖河少鄭善夫繼之郎中靖閩侯二谷半張含愈光月塢舉人靖滇白孫傅庭司馬禎晋虎王雲鳯應韶僉都𢎞晋鳯徐應簧軒卿參政吾溪子退鍾惺伯敬提學厯楚邃戴冠仲鶡提學靖河浚趙時春景仁僉都靖秦曙吳道南㑹甫閣臣啓江蘖王大用時行刑侍靖閩中麓李開先伯華太常靖東方王樵明逸總憲厯南同余有丁丙仲閣臣厯鄞西張綵吏書德秦東惲魏兩司德常汪佃有之太常石潭弟居艾希淳次伯兵侍慶秦星尹伸子求布政末川屏范應期伯禎祭酒厯湖堯劉爾牧長民成卿户郎厯東月張王屋石李春芳子實閣臣厯揚見蔡國珍汝聘太宰厯江碧林如楚汝翹工書旗峯孫鳯姚理汝循叙卿太守厯南淇竹衛承芳君夫尚書厯川梧王永和用節工侍統崑十佘夢鯉按察厯閩小王翹叔楚山人厯蘇大陳鼎府尹靖東與王橋布政靖楚鳯徐栻世寅工書厯蘇𤣥嶽鄭三俊相國末南匡徐即登參政厯江芝何如寵康侯閣臣末皖青劉鴻訓閣臣末東恆朱燮元懋和總督啓越衡朱恆嶽蔥王洽涵仲兵書啓東乾鹿善繼伯順太常禎北聫史繼階蓮嶽閣臣啓閩九張西園十王寅亮卿仲房山人慶歙太張居正叔大閣老蕭嶽峰五任忠齊黃省曽勉之舉人靖蘇陳文燭玉叔大理厯楚白嶽朱泰禎道之御史末閩海郭造卿建初山人厯閩東郭蔡宗堯學官靖台鄒守益謙之東廓祭酒靖江南王弼存敬知府𢎞台崔升廷進參政後渠父左中川劉汝楠白眉厯閩張采受先禮部末蘇北徐賁幼文悟淡布政初湖劉琦廷珍給事靖泰邱澤萬世德伯修兵侍啓晋雲王廷瞻稚表户書靖楚七張所望叔翹布政禎松舜蘇榖原夢王廷陳稚欽知州雲澤弟張師繹按察啓常三石喬世寧景叔邱隅按察靖秦馮時雍子和知府靖楚巾吕懷惟德太僕靖江方謝鐸鳴治禮侍德台文朱大韶象𤣥司業慶松張納陛以登禮部厯常西王之誥刑書慶楚東戴鱀時重副都靖鄞南俞振才仲才副使德越交吳文度憲之户書德南吳包孝元愛子敬御史䝉泉弟空許邦才殿卿長史厯東波徐樾子直布政靖江朋楊豫孫子殷副都慶松青翟瓉廷獻巡撫靖東松張業振烈司業成江劉天和養和司馬靖楚荆王錫爵元馭閣老厯蘇匪鄒維璉德輝兵侍禎江雲嶽倫原夫部郎靖黃張七澤漁唐龍虞佐太宰靖婺瑶黎民表惟敬參議慶粵槐朱應轂德載御史厯北鍾費寀子和禮書宏弟龍許成名思仁禮侍靖東壇熊明遇良孺兵書禎江藍孫瑋以貞總憲啓秦蘿董澐復宗從吾白塔山人靖秀左懋第仲及司馬末東大張守中巡撫厯晋少游璉世重副使靖陸釴舉之副使靖鄞友潘元明仲昭平章初揚王可菴米萬鍾仲詔太僕禎北白沈石田李谷平連礦伯金總漕靖北蔡汝楠子木工侍慶湖瑞江曉景熙兵侍東川子象蕭漢雲濤縣令禎江楚林材户書厯閩海王龍山錢薇懋垣給事慶秀瘦蔡餘慶從善參政𢎞台磊吳裕中幼益太僕啓楚淡鄭犮𤣥元韋御史末楚醉朱察卿邦憲工郎靖松纘江鐸士振巡撫瀾曽孫豫吕維祺介孺司馬禎河别號録卷九
