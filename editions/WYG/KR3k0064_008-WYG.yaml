  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0064_WYG_008-1a, image: WYG1034/WYG1034-0198a.png}
body:
  text: 别號録卷八崑山葛萬里撰西潭陳章一䕫太守𢎞松東蕭晼布政靖江楓萬虞愷􅅷卿刑侍慶江巗王廷榦維楨知府靖南龍葉夢熊男兆工書厯粤石劉髦孟恂舉人呆齋子汪俊抑之宗伯靖江北傅珪邦瑞宗伯徳北栢孫􅁇臯以徳吏侍厯常心菴唐臯守之學士靖歙方陳鑑緝熈祭酒成蘇升楊慎用修修撰石齋子西孫蕡仲衍典籍初粤𤣥穆孔暉伯潜太常靖東充顧冲菴冲顧養謙益卿戎政厯揚行張憲廷式工書徳江如于玉立中甫比部素齋孫存錢原善長史桐溪子金立敬工侍一所子周如磐聖培閣臣啓閩初方揚思善知府訒菴子休王竑公度司馬成秦光王賔仲光髙士初蘇完劉珏廷美僉事順蘇宜韓邦問大經司冦徳越容潘賜文錫卿寺宣閩謝宇伯寛侍郎統楚金澤徳潤右都𢎞鄞應大猷邦升刑書靖台伍蓉菴蓉伍袁翠寕芳參議啓蘇寅羅簡汝敬工侍宣江知羅箎應韶右都成江芸邱陵志髙布政統汴柴呉甡鹿友閣臣末滁貞章表翔鳯參議戒菴兄楊瑩參議成晋周倫伯明刑書徳崑陳璧瑞卿副都徳晋麥秀岐知縣厯粤思呉訥敏徳副都統蘇韓陽伯陽布政㬌越鮑象賢復之户書靖歙偲楊旦晋叔吏書榮曽孫眉楊基孟載去非按察初怡陳􅁇嗣初檢討秋水子虚李實孟誠縂憲順川唐西洲張祥鳶道卿知府慶南彤沈宸荃友蓀相國末鄞承胡松茂卿工書靖歙姚舜牧虞佐知縣厯湖恒耿九疇禹範司冦順河惺龎尚鵬少南副都厯粤乾任復菴馬自強體乾閣臣厯秦陶沈南齋歸子慕孝思孝亷震川子黄淳耀韞生進士末蘇微秦民悦崇化尚書𢎞廬深邱濬仲深閣老𢎞粤誠朱英世傑都憲成楚愚呉文泰文度州同初蘇李希顔賛善初河方克勤去矜太守正學父䝉陳全果之侍講宣閩陳贄惟成常少成越戴弁士章布政成江梅趙琬叔琰司業順常樗鄭潜彦昭同知初歙謝綬維章禮書成江王􅁮韜孟僉事慶江􅅾成始終敬之僉事順常蒿揭重熈萬年潜銘閣部末江匏呉寛原博宗伯𢎞蘇輿王文轅思輿處士靖越觀張瑄廷重安拙刑書成南熈來三聘任卿布政厯越頥張輔文弼英國統胡儼若思賔客統江鄒幹宗成禮書成杭遺錢幹習禮禮侍順江凝陸釴鼎儀静逸太常成崑唐鶴徴𤣥卿太常荆川子一顔瑄寳之户郎順常王棟隆吉教諭靖揚唐樞子鎮主事靖湖了季科與登參政厯常久黄綰宗賢石龍禮書定軒孫及葉盛與中少宰成崑介黄淮宗豫閣老統温陳鎰有戒左都景蘇吕原逄原閣老順秀鄭文康時乂進士成崑李錦在中两司成秦王恕宗貫太宰𢎞秦張敷華公實縂憲𢎞江蘄戒菴沈鐡知府厯閩止張洪宗海修撰宣蘇夏止軒熊翀騰霄户書徳河楊時喬宜遷少宰厯江張國維其四玉笥司馬末婺木林真汝實知縣宣古陳詢汝同祭酒景松毛憲式之給事靖常可𡊮華子英教官初崑王芾孟端中舍永常屈礿處誠處士順崑張棟伯任都諌厯崑本方桐川楊俊民伯章懐𥙷户書虞坡子立俞包山賀萬祚孝延布政啓秀自陳欽亮之提學矩菴弟石􅃽瑶粹卿司空靖湖克陳選士賢方伯成台聿傅鼎銓􅁇衡閣部末江冷陳𤦺粹之僉事𢎞蘇戒章格韶鳯大理𢎞蘇蘄貴充道閣臣靖南泊梁潜用之賛善永江定張悦時敏司馬𢎞松曹節時中宜晚副使徳松沈瓉子勺僉事厯蘇艮杜桓宗表紀善宣婺卓黄蘭坡叙李時宗易閣老靖北省李震宇用初兵侍成北沈鋭文進刑侍青門父見林聪季聪中丞順閩蔡可賢子齊聞吾參政慶北幸彭澤濟物臯蘭司馬靖秦念羅洪先逹天賛善靖江劉雲林恕鮑仁濟原宏紀善宣息施愛欲周知縣厯耻金問公遡禮侍統蘇楊鼎宗器司徒成秦陳煒文曜布政成閩矩陳鎬宗之中丞徳南昊胡廣光大閣臣永江晃即昊菴是莫伋士安維恭栢林助教初劉一璟季晦貞白閣老啓江易李徳仲修知縣初粤直盛應期斯徴縂憲靖蘇黄琥瑩之參政順江素鄒緝仲熈庶子永江商輅太朴𢎞載閣老成浙菜張環瑶夫知州靖晋栗鄭環瑶夫太常靖杭宋繐伯敬太宰厯河格章正宸羽侯吏侍末越枊伍方公矩知州成秀逸􅉟希元孟舉訥叟中書初陳璲廷嘉提學宣台陶琰廷信司馬靖晋退金善㓜孜閣老宣江鄧林觀善士齊吏部宣粤陳祚永錫僉憲順蘇逺李重元任副使靖南拙杜斆致道賓客初晋沈慶仲㑹副使景杭沈淳惟厚吏部景秀宋琰廷珪兵侍景鄞李紹克述禮侍成江張鵬騰霄兵書成北抑王直行儉太宰順江陳洪􅄥元卿副都厯杭狷金鉉伯玉在六員外末常畏周旋仲規庶子統浙俔復汝新處士靖鄞晋楊鏡川楊東明啓修侍郎啓河戴燿鳯岐縂督厯閩琢毛玉用成給事靖滇馮北海理蹇逹子修兵書厯閩約王宥敬之參政徳浙歐陽必進吏書靖江周金子庚司農靖常順胡來貢巡撫厯東勉楊榮勉仁少師宣閩寄朱應宸文奎學諭初蘇傅冠元文相國末江夢張肻􅁇孟寄夢處士統蘇雪劉廷諫咸仲僉都禎笨鄭方水鹵朱冕士章學諭順秀魯徐師曽伯魯兵科慶蘇劉沂春相國末閩質章敞尚文禮侍宣越韓文貫道司農徳晋王倬用儉兵侍鳯洲相范輅以載布政靖楚密謝肅元功僉事初越鄭昻處抑初温嗇髙遜志士敏太常建南肅王儀克敬巡撫靖北訒呉山静之刑書立齋子方沆子及提學厯歙訥周冕司諫永鄞鄭珞希玉两司統閩誼雍泰世隆正誼司農徳秦值盛直菴假劉鉉宗器禮侍順蘇儉梁材大用司農靖北栗永禄士學侍郎慶晋掃譚貞黙孟恂梁生僕少末秀損姚䕫大章太宰成浙王肯堂宇泰念西參政方􅅢子益陳騏夢祥副使徳粤歇陶望齡周望石簣祭酒泗橋子敬孫紳公佩工書靖北許孚逺孟中兵侍歴湖晦劉健希賢閣老徳河𥙷費誾廷言禮侍宏南華雲從龍刑郎靖常純何文淵巨川吏書椒邱父鈍龔詡大章安節統崑後李珏廷重大理靖北復髙暐汝晦僉事宣杭吕淵希顔布政成任環應乾參政靖晋呉中行子道少􅉟厯常楊廷樞維斗觧元末蘇惷張益士謙閣臣統蘇寗呉儼克温宗伯徳常實王龍山萃周遇吉忠武禎葦呉甘來節之給事禎江􅇨鄒梅崕蘖熊魚山樸萬祺維夀工書成江黎淳太朴禮書𢎞楚章拯工書楓山姪趙昌鳴盛布政𢎞南璞馬愉性和閣臣統東櫟俞士吉用貞侍郎宣浙毅黄汝良明起禮書禎閩静戴璡文進畫院統杭韓定世安太常𢎞北李崙世瞻大參𢎞秦胡世寕永清司馬靖杭蕭鳴鳯子雝布政靖北洪芳洲黙唐侃廷直刑主靖南整羅欽順允昇太宰靖江􅂂萬士和思節宗伯厯常謔王思任季重遂東禮書末越警許紳太章禮書靖南應檟子材兵侍靖處周子義以方吏侍厯常遯髙璧貴朋處士統越呉愈惟謙參政𢎞崑蔡復一元􅂂敬夫縂督啓閩柯夏卿司馬末台􅃉楊一清應寕石淙宰輔靖滇閬崔秋谷司馬節髙得𤾉孟升經歴永杭于謙廷益司馬景杭胡澧百鍾两司靖粤篠張和節之提學順崑簡沈粲民望大理宣松豐慶文慶布政一齋祖顧佐良弼户書徳南陳雍希冉刑書徳越􅃀魏學曽維貫兵書厯秦漸李世逹子成縂憲厯秦廓李漸菴擴董裕刑書厯東澹陳敬宗先世休樂祭酒統鄞楊溥宏濟少保統楚楊潤伯玉少參順江朱誠菴成蓬菴朱天球工書厯閩錢鎮守中曹郎厯湖淡通澹礪毛珵貞甫副都徳蘇毛鼇峯方鈍子銛仲敏户書靖楚蝶陳周改子鵑曹郎末川鳯程啓南開之工書啓晋鶠張紞昭季太宰建秦榖姚丹邱鐡黄翰按察順松侯堯封欽之復吾參政厯蘇全𤣥洲文安之汝止閣部末楚韞呉自新伯恒刑侍厯歙藴呉韞菴覺查秉彛府尹慶杭戇王休菴丹巖黄雲應龍學官治崑西王西石顧桴齋東徐文華用先大理靖川夏尚朴敦夫僕少靖江青王稌叔豐瞶叟華川子荆楊道賔惟彦禮侍厯閩崑鄭汝璧崙陽兵侍厯處梅馬鐸彦聲状元統閩濵何鏜振卿按察厯浙遵王慎中道思參政靖閩䨇樊繼祖兵書靖東白喬宇希大克䝉太宰靖晋玉周廣充之刑侍靖崑石嚴綋仲周布政靖南竹柯潜孟時􅉟事成閩印王鈁子宣司空靖越退黄未軒損朱淛必東御史靖閩紫劉龍舜卿司馬靖晋鳯黄甲首卿運判慶南别號録卷八
