  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0064_WYG_007-1a, image: WYG1034/WYG1034-0189a.png}
body:
  text: 别號録卷七崑山葛萬里撰西樵方獻夫叔賢閣臣靖粤呉鄒奕宏道知府永蘇松馮忠原孝知府慶鄞海王端溪陳鶴鳴壄九臯山人靖越野史謹公謹縣丞永崑雪劉丞直宗弼崆峒參政初江謝林瓊𣗳處士龜巢子李石城三橋文彭夀承國博衡山子西劉鈗汝中太常徳東林恕道近按察慶閩東趙晦浚明教諭初粤顧璘華玉司冦靖南楊大章章之刑侍靖越雲郭萬程子長主事靖閩雙朱懐幹守正太守靖湖泗陶承學子述禮書歇菴父草郎英仁寳七修慶杭野戴圭秉誠處士靖鄞林垠天宇户郎慶閩鐡黄矩洲呉臯喻時中甫户侍靖河東周砥􅂂道通判初蘇張愖汝誠統陸淵之克深布政𢎞南桑維喬子木御史靖揚王堯封伯圻戸書靖北鄒元標爾瞻縂憲啓江松許讃廷美閣老東崖子湘􅃽冕敬之閣老靖全州龍陸冶齋鳯張鶴鳴元平兵書禎潁鶴喬允升吉甫刑書禎河方坡曹世盛際卿參政靖閩松曽鶴齡延年松􅋯學士宣江畢鏘廷鳴司農厯南泉王英時彦宗伯統江虞楊博維約太宰慶晋蘭黄諌廷臣學士順揚小陳石亭午江以逹于順提學靖江玉張原士元給諫靖秦竹呉節與儉祭酒順江桂左賛時翊布政成江秫黎貞彦暉陶生廣文初粤雪萬節資中副使統江夢張淵子静夢鶴𢎞蘇敖文禎禮侍慶江鶴王良佐良弼知縣靖松汪鶴嶼東沙張時徹惟静兵書靖鄞南熊過叔仁部􅈠靖川金傅廣居乾駱從宇禮書啓湖白陳獻章公甫檢討治粤鄭樗菴景前溪鷺孫偉朗望知府靖同野蕭端䝉啓明御史慶粤劉廷梅與和副使慶江李渭湜之參政厯黔張如蘭徳馨參将厯南西𡊮崇冕布衣靖東黄中文卿副使靖處李璣邦在禮書慶江東郭朴質夫閣臣慶河南歐陽徳崇一閣學靖江芝孟芝軒秋嚴起恒相國末越周翁汝進子先參政啓杭涇吕柟仲木􅉟事靖秦莘田汝耕深甫司務靖汴芸瞿稼軒槐王維楨允寕祭酒靖秦樗方金湖巖陳邦彦㑹斌司馬末粤九孫良器貢甫山人厯歙小倪宗正本端知府徳越白殷秋溟洞廖道南鳴吾𤣥素學士靖楚鹿史道克宏兵書靖北朔尹耕子萃僉事靖晋心城劉錫𤣥玉受參政禎蘇方宗臣子相副使靖揚林東城東林春子仁文選靖揚青王璲汝玉賔客永蘇寅李成梁寕逺啓螺孫子良两司宣杭古張吉克修方伯徳江石李傑世賢吏書徳蘇許榖仲貽太常厯南赤夏鍭徳𣗳評事靖台两蘄學顔子愚少宰慶東雪洪璵宗器吏侍統浙榖于榖山𤓰涇徐源副都𢎞蘇横顧瑮英玉副使靖南少雒于仁評事厯秦木周復俊子籲太僕靖崑石陸􅇐元望工侍慶秀金庭朱賡少欽閣臣厯越周公鼐孝與禮侍厯東槐蔡承植少卿厯楚蘭謝徽𤣥懿編修初蘇立孫丕揚叔孝太宰厯秦念劉伯淵静之副使厯越翠林茂逹孚可大理靖檜鄭桓居貞參政建歙西亭朱睦㮮灌甫中尉厯初程啓充以道御史靖川希入熈字荷盧格正夫御史徳婺泉呉鼎維新參議靖杭溪嚴鳯季祥知府靖湖溝張天永長年雪􅅾殿學初常㡬熊釗伯璣初江陳龍正𤼵郊惕龍禮部末秀韶張四知子畏僉事厯河熈艾穆和父純卿中丞厯楚六陳宗虞子韶副使厯水樂頀舜儀少卿靖江石陳沂魯南太僕靖南竹王沂子與運同初江陳明水雨陳瓉廷祼刑侍慶蘇改方鳯時鳴御史靖崑丁賔禮原司空厯秀抑陳抑菴桂李汝華户書啓河草周昉元亮西崦初杭彭黯刑書靖江素方向與義知府徳皖敬張綸大經右都徳南海黄卿時庸布政靖東楚楊徳政公亮按察厯鄞野沈鉉文舉徴士初松劉忠司直閣老徳汴錢同愛孔周處士靖蘇矯方鵬時舉太常靖崑禮冦慎两司禎秦南屏潘辰時用常少徳處葵張景明廷光長史徳越岱崔元京山侯靖瑞顧錫疇九疇禮書末崑後盧勲汝立刑書靖處雪趙部院靖滇翠張以寕志道學士初閩張朂勉夫參政順蘇三汀陸儼山秋周瑞訓導徳崑松李獻可禮科厯閩歐頓鋭懐玉長史靖北蒲李廷相夢弼禮書靖東蘭梁有譽公實主事靖粤石殷正茂養實户書厯歙東溟范鏓平甫兵侍靖鏓管志道登之僉憲厯蘇南汪道崑伯玉太函兵侍厯歙秋殷邁時訓宗伯厯南滄李攀龍于鱗按察靖東鯤郭諫臣子忠参政厯蘇四謝榛茂秦山人慶東三洲沈淮􅊹伯通政慶杭元陸五湖張瀚子文吏書厯杭𤣥全天叙伯典􅉟事厯鄞平方邦望表民推官靖閩方張寕靖之知府成秀楊名實卿編修靖川芳陳循徳遵閣臣順江俞泰國昌參政靖常洪朝選汝尹舜臣刑侍厯閩王章漢臣御史禎常西唐胄平侯户侍靖粤東胡榮希仁提學成江屠僑安卿左都靖鄞崔桐來鳯禮侍靖揚夏良勝于中文選靖江田樂兵書厯北洪王圻元翰參議慶蘇湘李騰芳子實禮書禎楚滄周愷子諒灌夫郎署初江朱芾孟辨中書初松陳亮景明處士初閩張泰亨父修撰𢎞崑錢貢時庸刑郎慶秀晴程信廷實司馬篁墩父康羅萬化一甫禮書厯越環莘野奴耕巡檢初湖呉兌君澤兵書厯越鴻徐三重伯同主事厯松麟楊茂元志仁刑侍守陳子王世􅅷敬美常少鳯洲弟十仇英實甫畫史靖蘇方九叙禹績承天厯杭大趙貞吉孟静閣老慶川少馮惟訥汝言光禄閭山子水魏良弼師說給諫靖江白李士實若虚右都徳江玉朱曜叔𤾉提舉靖半張經廷彛兵書靖閩两王學䕫唐卿兵書靖江矩黄衷子和兵侍靖粤雪黄瓉公獻兵侍徳揚桂夏言公謹閣老靖江笋顧天叙禮初知縣瑞屏父箓周順昌景文吏部啓蘇藥田汝成叔禾豫陽參議靖杭鳯王世貞元美弇州司冦厯蘇鶴包聖師聖同知初常梅友松縂督厯黔徐標凖明督撫末東􅉱梁儲藏用叔厚閣老徳粤虚舟王偁孟揚龜巢檢討永閩陳梧崗鄭若庸中伯山人厯崑鄧雲霄𤣥度參政啓粤蓮王曰銓鮒鰅山人厯北霞呉鍾巒巒稚宗伯末常雨王濟伯雨州判靖湖海呉宏濟春陽䑓中厯秀丹邱姚綬公綬雲東御史成秀青髙啓季廸太史初蘇邵正已格之山人靖歙浮盧柟少楩子木太學慶北李敏功甫山人厯歙左滄嶼湄邢宥克寛副都成粤前𫝊汝舟木虛磊老山人靖閩葵謝晋孔昭深翠山人成蘇楓張嵿子謙工書靖越椒何喬新廷秀刑書𢎞江環鄧渼逺逰僉都啓江川樓呉國倫明卿甔甀參政厯楚西王磐鴻漸山人靖揚鄧原岳汝髙副使厯閩江錢宏可容巡撫靖杭枝髙倬刑書末川月倪敬汝敬御史順常白呉一鵬南夫吏書徳蘇易應昌侍郎末江石徐學聚敬輿巡撫啓婺海凌儒真卿僉都厯揚鶴張翀子儀刑侍厯桞州珠林劉松子髙司業初江章周軫公載按察治閩雲劉效祖仲修副使慶東楓朱升允升學士初歙梅胡宗憲汝欽司馬靖歙月邱橓懋賞吏書厯東少沈􅅷學君典状元古林子古沈寵思畏參政慶南王元敬廷臣兵侍厯越何天山參政石祝世禄無功尚寳厯江道􅃽信卿實提學靖楚雪曹㓜交永松鶴杜松成青縂兵厯秦别號録卷七
