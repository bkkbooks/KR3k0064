body:
  text: 别號録卷二明人崑山葛萬里撰槎翁張槎溪劉珠林癡史忠廷直卧癡靖南介歐陽哲廣哲提學順江南黎澄孟源工書統交址禿李贄宏甫卓吾太守厯閩茵季應期均饒闕初栁周栁塘海偶桓武孟江雨吏目初崑宋鵝池漫楊二山稼洪貫唯卿太白知縣德鄞贅徐尊生大年應奉初浙雲松張矩孟方永闕魏稱達卿學官德鄞喬項忠藎臣司馬成秀寒顧橫涇巢徐􅷂仲由闕初浙五儲可求闕侍初常黃濙御史成閩雪潘士藻去華尚寶厯歙景周嘉謨明卿吏書啓楚敬即景松萬饒欽克恭知府成歙偃畢松坡憲張至發聖鵠閣老末東聽方止軒鐵懷悅用和幕職成秀三峯唐白雲侯緘世言布政靖台劉陽一舒三五侍御靖江鮑道明行之户書靖歙高公韶户侍靖闕仁汪循進之别駕德歙元袁煒懋中閣臣靖鄞中董玘文玉吏侍靖越天王乾一清藏春畫史闕台文陳瑞兵書慶閩江呂高山甫僕少靖南台熊相尚弼御史靖台𤣥童美中道華副使慶蘇孫鑨文中太宰燧孫圭羅玘景鳴少宰德江董越尚矩工書靖江安劉采汝質兵書慶楚西趙璜庭實司空靖江南易元德元德粵劉文煥德徴闕侍德北楊循吉君謙儀部靖蘇東陳庸秉常州佐德粵汪𤣥錫天啓户侍靖歙萊周思兼叔夜提學慶松蓉汪浯溪葵黃光升明舉刑書慶閩都周怡順之常少靖南雯饒秉鑑憲章太守成江雲夏廷美處士慶南雷汪鏜振宗禮書慶鄞嵩華金子宣副使靖常陽張璧子象閣老靖楚晴沈懋孝幼真司業厯秀熊石瑤邦彥恆陽閣老靖北浮周沛允大州同靖越張元沖副都慶越剛梁侃德剛闕德江海瑞汝賢總憲厯粵端邵鋭時敏思抑太僕靖杭蓮韓紹宗裕後監司五泉父葉份原學提學靖歙聫翟鵬志南兵書靖東旗林春澤德敷太守靖閩蟠李遷子升安刑書慶江盤即蟠峯磐康朗用晦中丞靖閩羅張孚敬懋恭閣老靖溫蘿即羅峯龍吳子孝純叔參議白樓子龜唐奎闕粵鼇毛紀子維閣老靖東瀛張任希尹副都厯蘇一羅倫彛正修撰𢎞江蘇民天秀侍即靖秦九孫交志同户書靖楚曹泰時和闕定菴兄徐霖子仁髯仙闕靖南胡森秀夫鴻臚靖婺十程銈監司松溪父北阮朝東靖楚􅖘阮鶚應薦巡撫靖皖小黃葵峯少商大節孟堅部院靖楚五秦夔廷韶方伯𢎞常錢承德世恆監司德蘇文伯仁德承文學靖蘇石闕陳琳玉柔兵侍靖閩玉朱希周懋忠太宰德崑楊瑋伯玉光祿德松徐璉布政靖北幼余孟麟伯祥祭酒厯南近皇甫録世庸太守子百泉見王之垣爾式户侍霽宇父肖林應亮載熙户侍旗峯子兩洪鍾宣之總制德杭劉文敏宜克處士靖江海朱豹子文大守靖松吳龍峯雪董時望御史成東孫衍世延雪岑知府𢎞松華秦鳴雷子豫禮書厯浙楚周玉廷璋居士德滇筆王鳯靈應時參政靖閩道章適景南給事慶婺震張孟男元嗣户書厯汴後黃鞏伯固兵部德閩鳯沈愷舜臣九華太僕慶松紫陳琛思獻提學靖閩劔梅應魁念如錦衣厯楚淨張嶽惟喬總督靖閩靜張淨峯汪可受以虛總督厯楚嶽蕭大亨夏卿兵書厯東礪康太和原中工書靖閩繼舒化汝德刑書厯江三江丁積彥誠縣令𢎞江毛澄憲清宗伯靖崑中莫如忠子良方伯靖松西劉績孟熙嵩陽處士石田子東顧清士亷禮書靖松南馮恩子仁古狂御史靖松秋管浦𢎞濟通判靖越桐俞諫良佐掌院德浙萸羅喻義禹鍾湘中禮侍禎楚虛俞大猷志輔都督靖閩旴俞虛江羅近溪清貝瓊廷琚一名闕廷臣助教初秀俞行之文輔永江晴喻智子真闕侍靖河滄解綸大經御史縉兄澄尹直正言閣臣𢎞江甌張遜業有功冏丞孚敬子龍唐錦士絅提學靖松胡膏寺丞慶越沈鯉仲化閣老厯河林兆恩懋勳谷子三教冨孫雙聶豹文蔚兵書靖江戴德孺子良布政靖台方亷以清工侍慶杭小吳文華子彬兵書厯閩少莫是龍雲卿廷韓貢士中江子半邵圭文敬知府𢎞常趙寬栗夫按察靖蘇石歐陽鐸崇道少宰南野兄洞許天錫啓衷給諫德閩笠潘恩子仁左都慶松雪朱昶明通子溟長史宣南錦王璉汝器吏部青城子紫沈希儀唐佐都督靖廣西練劉永澄靜之職方厯揚漸江珍民瑾布政厯歙鶴蔡昻衡仲禮侍靖淮梅梁杜喬林君遷方伯末松漁廖莊安止大寺景江石萬雲鵬圖南副都靖淮趙從善伯兼太常厯婺陶奭齡君奭柴桑推官歇菴弟嶽和聲爾律巡撫啓秀南莊李鈞孟璿訓導統秀雲林俊廷弼待用見素司寇德閩梅俞山積之吏侍景秀蘭葉見泰夷仲刑曹初浙柿鄭嘉原亨永越栁袁珙廷玉寺丞永鄞菊袁宗宗彥長史初吳劉醇文中長史宣汴劉泰士亨處士順杭楝張昞仲明參政德鄞野王鈍士魯户書建晉心堂趙參魯宗𫝊司寇厯鄞𤣥葉荗才參之閒適工侍啓常東毛鼇峯容楊宏希仁都督靖南蘭卞榮華伯户曹順常水范淶元易布政厯歙是俞憲汝成按察靖常約劉浙君東約我匡南舉人厯江草劉顯都督綎父敬韓世能存良禮侍厯蘇寓張著則明同知初浙方塘潘鑑希古工書靖歙南宋景以賢左都靖江戚繼光元敬孟諸少保厯東東毛伯溫汝勵司馬靖江虹王宗茂時育御史與竹子筠陳幼學志行太常厯常龍葉龍潭午閔如霖師望禮書慶湖石許鎡僉事靖滇曽銑子重總督靖揚聞淵靜中吏書靖鄞栁楊子器名父方伯德鄞周思久闕厯楚草劉草堂碧侯執蒲以康太常厯河楝陳良謨忠夫參政靖湖鑑朱鴻謨文甫刑侍厯東如岡陳大科總督梧岡子陳懿典孟常少詹啓秀迂倫文叙伯疇諭德德粵芝熊廷弼非伯經略啓楚東柯暹啓暉用晦按察景南倪阜舜薰布政青溪弟李昆承裕兵侍靖東南尚志士行學官順秦李孟陽時雍工書𢎞河春劉訒思存刑書靖汴砂全思誠希賢殿學初松松姜洪啓洪修撰景江梧唐文鳯子儀紀善白雲子陳堯敬甫刑侍靖揚桐陳梧岡索承學遜夫户曹靖南郭維籓價夫常少靖汴宋應昌經略厯杭梅沈束宗安約通政靖越雲龔用卿鳴治祭酒靖閩龍張舜臣熙伯户書靖東印羅鳯子文知府靖南石王以旗士招司馬靖南蔡天祐承之兵侍靖南玉姚鎮公鼎指揮永象朱醉石何吾騶龍友閣臣末粵鳯盛納吏侍厯河後陳束約之提學靖鄞震丘度志中户侍厯淮慕馮應京兵備厯泗别號録卷二
