  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0064_WYG_006-1a, image: WYG1034/WYG1034-0181a.png}
body:
  text: 别號録卷六崑山葛萬里撰山泉慎䝉子正御史慶湖天潘仲驂時乘知府慶湖丹楊祜汝承僉事靖杭顧源清甫寳幢居士厯南方趙鏜仲聲僉都慶衢郭鯤溟平陸𣗳聲與吉宗伯厯松甘呉珫汝秀退修靖湖湛若水元明司馬靖粤西麻貴縂兵厯晋東姚鏌英之司馬靖鄞松史敏徳敏參政順淮夏邦謨舜俞吏書靖川姜南逄吉元貞两司靖秦髙謝東山少安巡撫厯川筠呉山曰静仁甫宗伯慶江蓉簡蓉溪華邉貢庭實司農靖東鳴梁夢龍乾吉吏書厯北瑶申時行汝黙閣老厯蘇䝉岳正季方閣老成北包節元逹御史靖松孫應奎文卿副都靖越姜廷頥以正兵侍慶楚敖銑純之禮侍靖北敖璠貴之两司厯江蘆劉績用熈知府徳楚麟王用汲刑書厯閩䨇羅循遵善按察念菴父一郭乾孟陽兵書慶北郭鋆允重工侍慶晋二邵寳國賢宗伯徳常小周蕙庭芳布衣靖秦林庭㭿利瞻工書泉山子少李士允子中􅁐卿靖汴王格汝化僕少慶楚汪宗伊子衡吏書白泉子郝􅇐彦甫户侍厯北官一䕫舜鳴同知厯東五韓邦靖汝慶參議徳秦及李頥惟貞右都厯江汲李天寵巡撫靖河古潘方塘白汪文盛希周大理靖楚玉戴静菴趙孔昭子潜兵侍厯北石闕可胡纉宗孝思世甫中丞靖秦蔡克亷道卿户書慶閩百皇甫汸子循僉事慶蘇季孫陞志髙禮書燧子羽劉畿朝宗兵侍慶蘇雨陳鎏子兼布政慶蘇汝趙賢吏書厯河見魏允貞􅅷忠兵侍厯北肖林庭機利仁禮書泉山子泰黄佐才伯少詹靖粤栢胡松汝茂太宰靖滁栁馬卿敬臣副都靖河瑞南大吉元善伯子知府靖秦碧張素巡撫靖滇湛王與齡受甫文選靖晋淡鄭曉窒甫司㓂靖秀裴􅂴雲澹通用淡紫楊潭宗淵户書徳北鹿史元中青蓮知縣厯鄞鳳王邦瑞維賢司馬靖河燕何孟春子元侍郎靖楚鶴彭汝實子冲給事靖川王建偉純光禄甌濵子對李戴仁夫吏書厯河墨呉黙泉黙呉鵬萬里吏書靖秀文川郜光先子孝兵書厯楚中左國璣舜齊舉人靖河平王承裕天宇户書恕子西孫艾世節處士靖蘇美尤時熈季主事慶河東汪瀾文瀾禮書𢎞杭劉春仁仲禮書徳川羅僑維升大參靖江吕大器儼若兵書末川南林光緝熈長史徳粤張珩縂督靖晋陶諧世和兵侍靖越虹龔秉徳性之副使厯東沂楊光溥文卿𢎞東涇張澯仲湜兵書徳􅀈桐方學漸逹卿文學厯皖荆唐順之應徳義修僉都靖常晴劉魁煥吾工郎靖江楊兆夢鏡兵書厯秦棠殷士儋正甫閣臣慶東華王禕子充待制初婺蓉齊之鸞瑞卿按察靖南蒲龔宏元之工書徳蘇蓴黎公弁之冕學官統江璉施峻平叔知府靖湖龍孟思叔正通判厯北九李奎文明大理統江滕霄子冲洗馬𢎞閩吕經道夫副都靖秦介毛愷逹和司冦慶衢五楊儀夢羽副使靖蘇月曹端正夫學正宣河白周用行之太宰靖蘇劉白原劉應節子和刑書厯東玉川袁尊尼魯望提學胥臺子石張寰宇清通參靖崑殷雲霄近夫工科徳東北陸稳汝成兵侍慶河百孫樓子虚推官厯蘇印潘季馴時良司空厯湖近查覺菴貝董倫安常禮侍建北甬張邦竒常甫兵書靖鄞洛黄洛村湛潘笠江浚王廷相子衡司馬靖汴葦陳霽子雨祭酒靖蘇望鄭渭應清副使厯閩與葛守禮與立縂憲厯東晋劉東星子明工書厯魯曹𦙍儒知州厯蘇錦梅應魁布政統川𢃄劉燾縂督慶北碧楊守阯維立吏書𢎞鄞鏡楊守陳維新吏侍靖鄞震歸有光熈甫冏丞慶崑何洛文啓圖禮侍大復子對王紳子書兵書靖北範詹萊時殷僉事慶衢鑑王崇古學甫司馬厯晋朱鑑塘西原薛蕙君采大寕郎中靖亳東杜瓊用嘉鹿冠處士成蘇南王韋欽佩參政徳南少余懋衡平伯持國吏書啓歙白劉景韶子成副都慶楚鹿戴欽時亮刑曹靖雒白悦貞夫僉事靖常糓蘇祐允吉縂督靖東湘􅃽湘臯澄龍宗武君揚副使厯楚汪應蛟司農啓歙蠡陳道亨兵書啓江古王約齋北源熊浃悦之太宰靖江湛沈應奎伯和光禄厯常濬申佳𦙍孔嘉井眉冏丞禎北鏡涂宗濬及甫司馬厯江西園李進孟昭訓導統秀張萱孟竒知府啓粤陳五岳劉心城東張惠廸吉禮書景東鄭紀廷綱户書𢎞閩何純菴南張志淳進之户侍半谷父芝張東沙梁宋子環文瑩布政統江漪焦竑弱侯從吾修撰厯南谿周啓公明訓導初江㯶劉昌欽謨參政成蘇古盧雍師邵提學靖蘇素方宏静定之户侍厯歙申濬源鹿萬表民望都督靖鄞徳虞淳熈長孺道民澹然稽勲厯杭廓魏大中孔時吏科啓秀澹薜北澗焦漪園元軒傅宗龍仲綸括蒼司馬禎滇宏張國彦熈載刑書厯北存趙存齋西陳金汝礪縂制徳楚東方行明敏參政谷珍子聶冷齋鄭東園芝胡濙源潔宗伯統常孟時芳晋醇禮書禎晋松梁婺叔車布政順江侗祝顥惟清參政𢎞蘇容程晴洲思王㒜廷貴太宰𢎞常清程逺齋需陳聚齋棠李長春元甫禮書厯川樊玉衡𤣥之縣令厯楚葵沈海觀瀾知府𢎞蘇張鵬霄圖南指揮徳秦琴陳璉廷器禮侍永粤愚髙明上逹僉都成江巢周鳯翔儀伯庶子禎越梅􅃽昪誠之户書冕兄槎髙青邱劉珠林友張雲門樊天山止方定志安學官永浙夏寅正夫方伯成松正夏止軒未黄潜仲昭提學𢎞閩半王行止仲澹如教讀初蘇在胡廷禄子厚兩司靖滇石漏瑜叔瑜大美越南御史宣湖竹蕭儼畏之布政成川戒蘄戒菴定姚福世昌守素千户順南黄孔昭世顯仲素工侍𢎞台陳于廷孟諤中湛縂憲禎常畏楊月湖耐王逹逹善天逰讀學宣常受貢安國元畧廣文靖南桂謝東溪柘凌雲翰彦冲教授初杭栢范祖幹景先純孝初婺晋劉戬景元諭徳徳江素古樸文質户書宣汴沐昻景顒定􅁁伯益孟忠廷臣知縣永崑敬薛瑄徳温閣老悔李悔齋慎辛自修子吉司空厯河黄輝昭素平倩少􅉟厯川澹錢宰子予伯均博士初越林文恒簡太常順閩馬璞菴成􅅾菴稼瞿式耜起田臨桂伯豫沈暉時𤾉工侍𢎞常翼李維楨本寕雲杜禮書厯楚覺鄒南臯南澗林廷玉粹夫户書徳閩楊守禮秉節兵書靖晋雲趙羾雲翰傖父刑書宣河筠觧開開先縉父北薛穆公逺通判初蘇竹周孟簡長史宣江潘希曽仲魯司馬靖婺别號録卷六
